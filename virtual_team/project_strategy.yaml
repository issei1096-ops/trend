company:
  name: "猿田彦珈琲株式会社"
  concept: "たった一杯で幸せになるコーヒー屋"
  core_value: "目と鼻と経験と味覚で厳選した最高品質のスペシャルティコーヒーを、温かいホスピタリティと共に提供する。システムやDXは、あくまで『スタッフが接客に集中するため』の黒子であること。"

products:
  core: "ダイレクトトレードによる自社焙煎スペシャルティコーヒー（豆、ドリップバッグ等）"
  sub: "オキーニョ（ベーカリー）、ティキタカアイス、ジェラッテなどのスイーツ・フード"
  service: "縛りなし・全品送料無料の定期便（8パターン）、選べるeギフト"

target_audience:
  primary: "店舗とECの両方を利用する「併用顧客」（最もLTVが高い超優良客）"
  secondary: "30〜50代の女性層、日常の「リセット・ご褒美」を求める層、ギフト購入者"
  challenge: "「店舗のみ」または「ECのみ」利用者を併用へ引き上げる。ただし、認知負荷（複雑なアプリ操作等）をかけて顧客体験を絶対に損なわない設計とすること。"

strengths:
  - "実店舗で培われた圧倒的な「人間味・親近感・ホスピタリティ」（ここをDXで絶対に削らない）"
  - "スペシャルティコーヒーの専門性と、泥臭い営業力（PR部門の直接メディア訪問等）"

current_goals:
  kgi_ec: "ECリピート率50%以上への引き上げ、および営業利益率15%の達成"
  kgi_pr: "年2〜4回の質の高いテレビ露出（能動的な足を使ったキーマン営業の継続）"
  operation: "物流移管等による裏側の徹底的なコスト削減と、それを原資とした『人の温もり（CX）』への再投資"

winning_requirements_v2:
  marketing: "顧客の実際の消費ペース（データ）に基づき、哲学の押し付けではなく『手軽で美味しい』機能的価値をシンプルに提供する。"
  store_cx: "レジでの滞留をゼロにするUI/UX設計。スタッフの接客時間を奪うDX施策は即時撤廃・改善する。"
  customer_support: "AIは完璧な回答マシンではなく『トランザクション処理担当』。感情労働は即時有人（ホスピタリティ）へエスカレーションする。"
  media_pr: "コンプライアンス等に配慮しつつも、アナログで熱量のある泥臭いメディア営業（コーヒー持参等）は猿田彦ならではの強みとして研ぎ澄ます。"
