name: Daily Trend Reporter

on:
  schedule:
    # 毎日朝 07:50 JST に実行 (UTCで 22:50)
    - cron: '50 22 * * *'
  # GitHubの画面から手動で実行できるようにする
  workflow_dispatch:

jobs:
  run-reporter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Trend Reporter Script
        env:
          # 今回追加するGeminiのAPIキー（後ほどGitHub Secretsに登録します）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 以前SNSアラートで設定したGmailの環境変数を使い回せます
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECEIVER_EMAIL: ${{ secrets.ALERT_RECEIVER_EMAIL }}
        run: |
          pip install google-generativeai
          python virtual_team/scripts/trend_reporter.py
